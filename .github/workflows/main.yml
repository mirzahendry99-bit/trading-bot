name: Trading Bot V4

permissions:
  contents: write

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: pip install gate-api pandas numpy

      # Run bot
      - name: Run bot
        env:
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY: ${{ secrets.GATE_SECRET_KEY }}
        run: python bot.py

      # Save position (ANTI ERROR VERSION)
      - name: Save position
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"

          git pull origin main --rebase || true

          git add position.json || true
          git commit -m "update position" || true
          git push || true
