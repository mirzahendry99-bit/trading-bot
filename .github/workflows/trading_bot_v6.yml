name: Altcoin Trading Bot v6

on:
  schedule:
    - cron: "*/30 * * * *"   # setiap 30 menit — evaluasi posisi + cek sinyal baru
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan manual run (opsional)"
        required: false
        default: "manual trigger"

concurrency:
  group: altcoin-trading-bot
  cancel-in-progress: true   # hindari dua run bersamaan yang bisa double-entry

jobs:
  run-bot:
    name: Run Altcoin Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 8       # bot seharusnya selesai < 5 menit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gate-api supabase

      - name: Run bot
        env:
          GATE_API_KEY:           ${{ secrets.GATE_API_KEY }}
          GATE_SECRET_KEY:        ${{ secrets.GATE_SECRET_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
          SIGNAL_SUPABASE_URL:    ${{ secrets.SIGNAL_SUPABASE_URL }}
          SIGNAL_SUPABASE_KEY:    ${{ secrets.SIGNAL_SUPABASE_KEY }}
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:                ${{ secrets.TELEGRAM_CHAT_ID }}
          INITIAL_EQUITY_USDT:    ${{ secrets.INITIAL_EQUITY_USDT }}
        run: |
          for i in 1 2 3; do
            python bot_trading_v6.py && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="⚠️ Altcoin Trading Bot GAGAL — cek GitHub Actions!"
